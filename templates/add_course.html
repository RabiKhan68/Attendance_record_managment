<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; padding: 30px; }
        .form-box { width: 400px; margin: auto; padding: 25px; background: white; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 12px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #2c7be5; color: white; border: none; cursor: pointer; }
        button:hover { background: #1a68d1; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Add a Course</h2>
        <form method="post">
            <label for="class_id">Select Class</label>
            <select name="class_id" id="class_id" required>
                {% for cls in classes %}
                    <option value="{{ cls.class_id }}">{{ cls.class_name }}</option>
                {% endfor %}
            </select>

            <label for="course_name">Course Name</label>
            <input type="text" name="course_name" id="course_name" placeholder="Enter course name" required>

            <button type="submit">Add Course</button>
        </form>
    </div>
</body>
</html>
