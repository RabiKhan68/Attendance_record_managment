<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #2c7be5; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 10px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        hr { border: none; height: 1px; background: #ddd; margin: 0; }
    </style>
</head>
<body>

<!-- Admin Navbar -->
<nav>
    <div><strong>Admin Dashboard</strong></div>
    <div>
        {% if session.admin_name %}
            Welcome, {{ session.admin_name }} |
            <a href="{{ url_for('admin_logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('admin_login') }}">Login</a>
        {% endif %}
    </div>
</nav>
<hr>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
