<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f4f6f9; 
            margin: 0; 
            padding: 0; 
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        h2, h3 { text-align: center; color: #333; }
        .nav {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .nav a { 
            margin: 0 15px; 
            text-decoration: none; 
            color: #2c7be5; 
            font-weight: bold;
            transition: color 0.2s ease;
        }
        .nav a:hover { color: #1a68d1; }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            border-radius: 8px;
            overflow: hidden;
        }
        th, td { 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid #ddd; 
        }
        th { 
            background: #2c7be5; 
            color: white; 
            font-size: 16px;
        }
        tr:hover { background: #f1f1f1; }
        a.button {
            display: inline-block;
            padding: 6px 12px;
            background: #2c7be5;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.2s ease;
        }
        a.button:hover { background: #1a68d1; }
        @media (max-width: 600px) {
            table, th, td { font-size: 14px; }
            .nav { flex-direction: column; }
            .nav a { margin: 5px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Admin Dashboard</h2>

        <div class="nav">
            <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('admin_logout') }}">Logout</a>
        </div>

        <h3>Classes</h3>
        <table>
            <thead>
                <tr>
                    <th>Class ID</th>
                    <th>Class Name</th>
                    <th>Students</th>
                </tr>
            </thead>
            <tbody>
                {% for cls in classes %}
                <tr>
                    <td>{{ cls.class_id }}</td>
                    <td>{{ cls.class_name }}</td>
                    <td>
                        <a href="{{ url_for('admin_students', class_id=cls.class_id) }}" class="button">View Students</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3">No classes found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
